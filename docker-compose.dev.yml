services:
  postgres:
    image: postgres:15
    restart: always
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    networks:
      - saifurspublications-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 2s
      retries: 20
    volumes:
      - saifurspublications_postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: always
    ports:
      - "127.0.0.1:3000:3000"
    env_file: .env
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
      - ./public/uploads:/app/public/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - saifurspublications-network
    command: >
      sh -c "pnpx prisma migrate dev && 
             pnpm dev" 

  prisma-studio:
    build: .
    command: npx prisma studio --port 5555 --browser none
    ports:
      - "5555:5555"
    env_file: .env
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - postgres
    networks:
      - saifurspublications-network

networks:
  saifurspublications-network:


volumes:
  saifurspublications_postgres_data:
