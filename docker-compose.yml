services:
  postgres:
    image: postgres:15
    restart: always
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=prisma
    ports:
      - "5433:5432"
    networks:
      - saifurspublications-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U prisma -d postgres" ]
      interval: 5s
      timeout: 2s
      retries: 20
    volumes:
      - saifurspublications_postgres_data:/var/lib/postgresql/data
    command: postgres -c listen_addresses='*'
    logging:
      options:
        max-size: "10m"
        max-file: "3"
networks:
  saifurspublications-network:
volumes:
  saifurspublications_postgres_data:
